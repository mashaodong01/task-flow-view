<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42B883;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D9771;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#grad)" filter="url(#shadow)"/>

  <!-- 任务列表图标（三条横线） -->
  <line x1="8" y1="10" x2="24" y2="10" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="8" y1="16" x2="24" y2="16" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="8" y1="22" x2="18" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- 勾选标记（在第二条线上） -->
  <circle cx="21" cy="16" r="4" fill="white" opacity="0.95"/>
  <path d="M 19.5 16 L 20.5 17 L 22.5 15"
        stroke="#42B883"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
</svg>
